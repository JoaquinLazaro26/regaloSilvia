
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Silvia 🌸</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background: radial-gradient(circle at bottom, #2b1055 0%, #0b0b2a 100%);
            overflow: hidden;
            font-family: 'Montserrat', sans-serif;
        }

        /* Chispitas de fondo */
        .sparkles-container {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .sparkle {
            position: absolute;
            background-color: #fff;
            border-radius: 50%;
            box-shadow: 0 0 10px 2px rgba(255, 255, 255, 0.4);
            animation: float 5s infinite ease-in-out, blink 2s infinite alternate;
        }

        @keyframes float {
            0% { transform: translateY(0px) translateX(0px); }
            50% { transform: translateY(-20px) translateX(10px); }
            100% { transform: translateY(0px) translateX(0px); }
        }

        @keyframes blink {
            0% { opacity: 0.2; transform: scale(0.8); }
            100% { opacity: 0.9; transform: scale(1.2); }
        }

        /* Mensaje (Mitad superior) */
        #message-container {
            position: absolute;
            top: 8%;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 650px;
            text-align: center;
            opacity: 0;
            transition: opacity 3s ease-in-out;
            z-index: 10;
            pointer-events: none;
        }

        h1 {
            color: #ffc3a0;
            font-family: 'Great Vibes', cursive;
            font-size: clamp(3rem, 6vw, 4.5rem);
            margin: 0 0 10px 0;
            text-shadow: 0 0 20px rgba(255, 195, 160, 0.8);
            line-height: 1.2;
        }

        p {
            color: #f8edeb;
            font-size: clamp(0.9rem, 2vw, 1.1rem);
            line-height: 1.6;
            margin: 0;
            text-shadow: 1px 1px 5px rgba(0,0,0,0.8);
        }

        /* Contenedor de la Flor (Mitad inferior) */
        .wrapper {
            position: absolute;
            bottom: 5%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 5;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .flower-container {
            position: relative;
            cursor: pointer;
            width: 200px;
            height: 380px;
        }

        /* Tallo centrado matemáticamente */
        .stem {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            width: 8px;
            height: 200px;
            background: linear-gradient(to right, #1a4a15, #3a7d2e, #1a4a15);
            bottom: 0;
            border-radius: 4px;
            z-index: 2;
        }

        /* Hojas unidas directamente al tallo */
        .leaf {
            position: absolute;
            width: 70px;
            height: 30px;
            background: linear-gradient(to bottom, #4ca138, #2d5a27);
            border-radius: 0 100% 0 100%;
            bottom: 60px;
            box-shadow: inset 2px 2px 5px rgba(255,255,255,0.2);
            transition: transform 2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1;
        }
        
        /* Conectadas al centro exacto */
        .leaf.left { 
            right: 50%; 
            transform-origin: right bottom; 
            transform: rotate(15deg) scale(0.4); 
        }
        .leaf.right { 
            left: 50%; 
            transform-origin: left bottom; 
            transform: rotate(75deg) scale(0.4); 
        }

        /* Base verde de la flor que envuelve los pétalos */
        .calyx {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            bottom: 195px;
            width: 28px;
            height: 25px;
            background: linear-gradient(to right, #1a4a15, #3a7d2e, #1a4a15);
            border-radius: 0 0 50% 50%;
            z-index: 6; /* Mayor que los pétalos para cubrirlos por abajo */
        }

        /* Contenedor central de los pétalos */
        .petals {
            position: absolute;
            left: 50%;
            bottom: 200px; /* Escondido un poco dentro del cáliz */
            z-index: 4;
        }

        /* Estructura de cada pétalo */
        .petal {
            position: absolute;
            bottom: 0;
            left: -35px; /* Mitad del ancho para centrarlo en el punto de pivote */
            width: 70px;
            height: 150px;
            background: linear-gradient(to top, #d81b60 0%, #ff7eb3 40%, #fff0f3 100%);
            border-radius: 50% 50% 50% 50% / 80% 80% 20% 20%;
            transform-origin: bottom center;
            box-shadow: inset 0 -5px 15px rgba(0,0,0,0.2);
            transition: transform 2s cubic-bezier(0.2, 0.8, 0.2, 1);
            
            /* Todos inician cerrados rectos hacia arriba */
            transform: scaleX(0.3) scaleY(0.7) rotate(0deg); 
        }

        /* Vena del pétalo */
        .petal::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 2px;
            height: 60%;
            background: linear-gradient(to top, rgba(150, 10, 50, 0.6), transparent);
        }

        /* Estambres amarillos (Centro) */
        .stamens {
            position: absolute;
            left: 50%;
            bottom: 200px;
            z-index: 5;
        }

        .stamen {
            position: absolute;
            bottom: 0;
            left: -1px;
            width: 2px;
            height: 0px; 
            background: #e5ff00;
            transform-origin: bottom center;
            transition: height 1.5s ease-out, transform 1.5s ease-out;
        }

        .stamen::after {
            content: '';
            position: absolute;
            top: -5px;
            left: -3px;
            width: 8px;
            height: 12px;
            background: #d47000;
            border-radius: 50%;
            opacity: 0;
            transition: opacity 1.5s;
        }

        /* =========================================
           ANIMACIÓN DE APERTURA (BLOOM) 
           ========================================= */

        /* Abriendo en abanico perfecto hacia arriba */
        .bloomed .petal:nth-child(1) { transform: rotate(-75deg) scale(1) translateY(-5px); transition-delay: 0s; }
        .bloomed .petal:nth-child(2) { transform: rotate(75deg) scale(1) translateY(-5px); transition-delay: 0.1s; }
        .bloomed .petal:nth-child(3) { transform: rotate(-40deg) scale(1.1); transition-delay: 0.3s; z-index: 5;}
        .bloomed .petal:nth-child(4) { transform: rotate(40deg) scale(1.1); transition-delay: 0.4s; z-index: 5;}
        .bloomed .petal:nth-child(5) { transform: rotate(0deg) scale(1.2); transition-delay: 0.6s; z-index: 6;}
        
        /* Pétalo trasero para dar volumen (está detrás del del centro) */
        .bloomed .petal:nth-child(6) { transform: rotate(0deg) scale(1) translateY(-15px); transition-delay: 0.2s; z-index: 3; filter: brightness(0.8);}

        /* Estambres creciendo */
        .bloomed .stamen:nth-child(1) { height: 90px; transform: rotate(-30deg); transition-delay: 1s; }
        .bloomed .stamen:nth-child(2) { height: 110px; transform: rotate(-10deg); transition-delay: 1.1s; }
        .bloomed .stamen:nth-child(3) { height: 110px; transform: rotate(10deg); transition-delay: 1.2s; }
        .bloomed .stamen:nth-child(4) { height: 90px; transform: rotate(30deg); transition-delay: 1.3s; }
        .bloomed .stamen::after { opacity: 1; transition-delay: 1.5s; }

        /* Hojas desplegándose */
        .bloomed ~ .leaf.left { transform: rotate(-10deg) scale(1); }
        .bloomed ~ .leaf.right { transform: rotate(100deg) scale(1); }

        /* Animación de respiración una vez abierta */
        .breathing .petals {
            animation: breathe 4s infinite ease-in-out alternate;
        }

        @keyframes breathe {
            0% { transform: scale(1); }
            100% { transform: scale(1.02) translateY(2px); }
        }

        /* Texto de Toca la flor */
        .hint {
            color: #ffc3a0;
            font-size: 0.9rem;
            margin-top: 10px;
            animation: pulseHint 1.5s infinite;
            pointer-events: none;
            letter-spacing: 2px;
            font-weight: 500;
        }

        .bloomed-hint {
            opacity: 0 !important;
            transition: opacity 0.5s;
        }

        @keyframes pulseHint {
            0% { transform: translateY(0); opacity: 0.5; }
            50% { transform: translateY(-3px); opacity: 1; text-shadow: 0 0 8px rgba(255, 195, 160, 0.8); }
            100% { transform: translateY(0); opacity: 0.5; }
        }

    </style>
</head>
<body>

    <div class="sparkles-container" id="sparkles"></div>

    <div id="message-container">
        <h1>¡Feliz Cumpleaños<br>Silvia!</h1>
        <p>Eres luz, magia y alegría. Que este nuevo año de vida florezca con momentos inolvidables, mucha paz en tu corazón y todos tus sueños cumplidos.<br>Te mereces lo más hermoso del mundo. ✨</p>
    </div>

    <div class="wrapper">
        <div class="flower-container" id="flower" onclick="bloom()">
            
            <div class="stem"></div>
            
            <div class="petals">
                <div class="petal"></div>
                <div class="petal"></div>
                <div class="petal"></div>
                <div class="petal"></div>
                <div class="petal"></div>
                <div class="petal"></div> <!-- Pétalo trasero -->
            </div>
            
            <div class="stamens">
                <div class="stamen"></div>
                <div class="stamen"></div>
                <div class="stamen"></div>
                <div class="stamen"></div>
            </div>

            <!-- El cáliz va DESPUÉS en el HTML para sobreponerse a la base de los pétalos -->
            <div class="calyx"></div> 

            <div class="leaf left"></div>
            <div class="leaf right"></div>
            
        </div>
        
        <div class="hint" id="hint-text">✨ TOCA LA FLOR ✨</div>
    </div>

    <script>
        const sparklesContainer = document.getElementById('sparkles');
        for (let i = 0; i < 50; i++) {
            let sparkle = document.createElement('div');
            sparkle.classList.add('sparkle');
            sparkle.style.left = Math.random() * 100 + 'vw';
            sparkle.style.top = Math.random() * 100 + 'vh';
            sparkle.style.width = Math.random() * 3 + 1 + 'px';
            sparkle.style.height = sparkle.style.width;
            sparkle.style.animationDelay = Math.random() * 5 + 's';
            sparklesContainer.appendChild(sparkle);
        }

        let hasBloomed = false;

        function bloom() {
            if (hasBloomed) return;
            hasBloomed = true;

            const flower = document.getElementById('flower');
            
            flower.classList.add('bloomed');
            document.getElementById('hint-text').classList.add('bloomed-hint');

            setTimeout(() => {
                flower.classList.add('breathing');
            }, 2500);

            setTimeout(() => {
                document.getElementById('message-container').style.opacity = '1';
                
                var duration = 4 * 1000;
                var animationEnd = Date.now() + duration;
                var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 0 };

                var interval = setInterval(function() {
                    var timeLeft = animationEnd - Date.now();

                    if (timeLeft <= 0) {
                        return clearInterval(interval);
                    }

                    var particleCount = 40 * (timeLeft / duration);
                    confetti(Object.assign({}, defaults, { 
                        particleCount, 
                        origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 },
                        colors: ['#ff7eb3', '#ffc3a0', '#ffffff', '#e5ff00']
                    }));
                    confetti(Object.assign({}, defaults, { 
                        particleCount, 
                        origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 },
                        colors: ['#ff7eb3', '#ffc3a0', '#ffffff', '#e5ff00']
                    }));
                }, 250);

            }, 1800);
        }

        function randomInRange(min, max) {
            return Math.random() * (max - min) + min;
        }
    </script>
</body>
</html>
